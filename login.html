<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Admin - MOKAMBO PARKING AUTO ONLINE 🟢</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <span class="login-logo">🟢</span>
                <h2>Administration</h2>
                <p>Espace réservé aux administrateurs</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="email" required placeholder="admin@exemple.com">
                </div>
                <div class="form-group" style="position: relative;">
                    <label><i class="fas fa-lock"></i> Mot de passe</label>
                    <input type="password" id="password" required placeholder="••••••••">
                    <span class="toggle-password" onclick="togglePassword()">
                        <i class="fas fa-eye"></i>
                    </span>
                </div>
                <div class="form-group">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe" checked>
                        <span>Rester connecté</span>
                    </label>
                </div>
                <div id="loginError" class="login-error"></div>
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Se connecter
                </button>
            </form>
            <div class="login-footer">
                <a href="index.html"><i class="fas fa-arrow-left"></i> Retour au catalogue</a>
            </div>
            <div class="login-info">
                <p><i class="fas fa-info-circle"></i> Accès réservé au personnel autorisé</p>
            </div>
        </div>
    </div>
    <script src="auth.js"></script>
    <script>
        if (auth.isLoggedIn()) {
            window.location.href = 'admin.html';
        }
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const errorDiv = document.getElementById('loginError');
            
            const result = auth.login(email, password, rememberMe);
            
            if (result.success) {
                const btn = document.querySelector('.btn-login');
                btn.innerHTML = '<i class="fas fa-check"></i> Connexion réussie...';
                btn.style.background = '#059669';
                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 800);
            } else {
                errorDiv.textContent = result.message;
                errorDiv.style.display = 'block';
                setTimeout(() => {
                    errorDiv.style.display = 'none';
                }, 4000);
            }
        });
        
        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.querySelector('.toggle-password i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>
</html>
